<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistema de Matrículas PUCPR</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-5">
<div class="card shadow-lg p-4">
<h2 class="text-center mb-4">Sistema de Matrículas PUCPR</h2>
<form id="form">
<div class="row g-3">
<div class="col-md-6"><label>Nome Completo</label><input class="form-control" required></div>
<div class="col-md-6"><label>CPF</label><input class="form-control" required></div>
<div class="col-md-6"><label>E-mail</label><input type="email" class="form-control" required></div>
<div class="col-md-6"><label>Telefone</label><input class="form-control"></div>
<div class="col-md-6"><label>Curso</label>
<select class="form-select">
<option>Análise e Desenvolvimento de Sistemas</option>
<option>Engenharia de Software</option>
<option>Ciência da Computação</option>
<option>Sistemas de Informação</option>
</select></div>
<div class="col-md-6"><label>Documento</label><input type="file" class="form-control"></div>
<div class="col-12">
<label>Forma de Pagamento</label><br>
<input type="radio" name="pg" checked> Pix
<input type="radio" name="pg"> Cartão
<input type="radio" name="pg"> Boleto
</div>
<div class="col-12 text-center">
<button class="btn btn-primary px-5">Realizar Matrícula</button>
</div>
</div>
</form>
<div id="msg" class="alert alert-success mt-4 d-none">
✅ Matrícula realizada com sucesso! Seus dados foram enviados para análise.
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
